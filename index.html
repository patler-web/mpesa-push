<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M-Pesa Payment - Secure Checkout</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #00B207 0%, #00A1E0 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .payment-card {
            background: white;
            border-radius: 30px;
            padding: 40px 30px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
        }
        .amount-display {
            background: linear-gradient(135deg, #00B207 0%, #00A1E0 100%);
            color: white;
            padding: 20px;
            border-radius: 20px;
            margin: 20px 0;
        }
        .amount-value {
            font-size: 48px;
            font-weight: bold;
        }
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }
        input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
        }
        input:focus {
            outline: none;
            border-color: #00B207;
        }
        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #00B207 0%, #00A1E0 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        button:disabled {
            opacity: 0.6;
        }
        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 12px;
            display: none;
        }
        .status.success { background: #d4edda; color: #155724; display: block; }
        .status.error { background: #f8d7da; color: #721c24; display: block; }
        .status.info { background: #d1ecf1; color: #0c5460; display: block; }
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
            margin-left: 10px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="payment-card">
        <h1>💚 Complete Payment</h1>
        <p style="color:#666;">Pay securely with M-Pesa</p>

        <div class="amount-display">
            <div>Amount to Pay</div>
            <div class="amount-value" id="amountDisplay">KES 0</div>
        </div>

        <div class="form-group">
            <label>📞 Your M-Pesa Number</label>
            <input type="tel" id="phone" placeholder="0716081217">
            <small style="color:#888;">You'll receive a prompt on this number</small>
        </div>

        <div class="form-group">
            <label>📝 Your Full Name</label>
            <input type="text" id="name" placeholder="John Doe">
        </div>

        <button onclick="sendPayment()" id="payBtn">
            💳 Pay Now
        </button>

        <div id="status" class="status"></div>
    </div>

    <script>
        // Get amount from URL (e.g., ?amount=500)
        const urlParams = new URLSearchParams(window.location.search);
        let amount = urlParams.get('amount');
        if (!amount) amount = 100;
        document.getElementById('amountDisplay').innerHTML = `KES ${parseInt(amount).toLocaleString()}`;

        // YOUR GOOGLE APPS SCRIPT URL (replace with your actual URL)
        const BACKEND_URL = 'https://script.google.com/macros/s/AKfycbxjjKtb1c1D0VvBwlptUpOE_bnox0wTrO6jFOxzUVv4EdJNS7nHc9_vqQav_0RPlwJmaQ/exec';

        async function sendPayment() {
            const phone = document.getElementById('phone').value;
            const name = document.getElementById('name').value;
            const payBtn = document.getElementById('payBtn');
            const statusDiv = document.getElementById('status');

            if (!phone) {
                showStatus('❌ Please enter your M-Pesa number', 'error');
                return;
            }
            if (!name) {
                showStatus('❌ Please enter your name', 'error');
                return;
            }

            payBtn.innerHTML = 'Sending Prompt... <span class="loading"></span>';
            payBtn.disabled = true;

            try {
                const response = await fetch(BACKEND_URL, {
                    method: 'POST',
                    mode: 'no-cors',  // Required for Google Apps Script
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        phone: phone,
                        amount: parseInt(amount),
                        reference: `PAY-${Date.now()}`
                    })
                });

                showStatus('✅ Payment prompt sent! Check your phone and enter your M-Pesa PIN.', 'success');
                
            } catch (error) {
                showStatus('❌ Error sending prompt. Please try again.', 'error');
            } finally {
                setTimeout(() => {
                    payBtn.innerHTML = '💳 Pay Now';
                    payBtn.disabled = false;
                }, 3000);
            }
        }

        function showStatus(message, type) {
            const statusDiv = document.getElementById('status');
            statusDiv.textContent = message;
            statusDiv.className = `status ${type}`;
            setTimeout(() => {
                statusDiv.style.display = 'none';
            }, 8000);
        }
    </script>
</body>
</html>
