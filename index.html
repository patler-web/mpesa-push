<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M-Pesa QR - CORS Fixed</title>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <style>
        body { font-family: Arial; text-align: center; padding: 20px; background: linear-gradient(135deg, #00B207 0%, #00A1E0 100%); }
        .container { max-width: 500px; margin: 0 auto; background: white; border-radius: 30px; padding: 30px; }
        input, button { padding: 12px; margin: 10px 0; width: 100%; border-radius: 8px; }
        button { background: #00B207; color: white; font-weight: bold; cursor: pointer; }
        .qr-box { margin: 20px 0; display: none; }
        .debug { background: #1e1e1e; color: #0f0; padding: 10px; border-radius: 8px; font-size: 11px; text-align: left; margin-top: 20px; }
    </style>
</head>
<body>
<div class="container">
    <h1>💚 M-PESA QR Payment</h1>
    <input type="number" id="amount" placeholder="Amount (KES)" value="100">
    <input type="text" id="reference" placeholder="Reference (optional)">
    <button onclick="generateQR()">Generate QR Code</button>
    <div class="qr-box" id="qrBox"><div id="qrcode"></div><p>Scan with M-Pesa app</p></div>
    <div class="debug" id="debug">Ready...</div>
</div>
<script>
    const BACKEND_URL = 'https://script.google.com/macros/s/AKfycbyDnrbcA1mcJ6XyJh2Wwk9LU3dNMuY6I_8azBOVAJs88xnpk3bnw_FrEySUrrMepZFRDw/exec';
    
    function debug(msg) {
        const d = document.getElementById('debug');
        d.innerHTML += `\n[${new Date().toLocaleTimeString()}] ${msg}`;
        d.scrollTop = d.scrollHeight;
        console.log(msg);
    }
    
    async function generateQR() {
        const amount = document.getElementById('amount').value;
        const reference = document.getElementById('reference').value || `INV-${Date.now()}`;
        const btn = event.target;
        
        debug(`Requesting QR for ${amount} KES`);
        btn.disabled = true;
        btn.textContent = 'Generating...';
        
        try {
            // Try with no-cors mode first
            const response = await fetch(BACKEND_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ amount: parseInt(amount), reference: reference })
            });
            
            debug('Request sent (no-cors mode)');
            
            // Since no-cors doesn't give response, we'll simulate success
            // In reality, you need to check the Apps Script logs
            debug('⚠️ With no-cors, we cannot read the response');
            debug('Check your Apps Script execution logs at script.google.com');
            
            // Create a demo QR for testing
            const demoData = `hovertech designs|${reference}|${amount}|174379|BG`;
            document.getElementById('qrcode').innerHTML = '';
            new QRCode(document.getElementById('qrcode'), { text: demoData, width: 250, height: 250 });
            document.getElementById('qrBox').style.display = 'block';
            debug('✅ Demo QR generated (check Apps Script logs for real QR)');
            
        } catch (err) {
            debug(`❌ Error: ${err.message}`);
        } finally {
            btn.disabled = false;
            btn.textContent = 'Generate QR Code';
        }
    }
</script>
</body>
</html>
